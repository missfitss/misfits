--- /dev/null
+++ b/.github/workflows/html-lint.yml
@@ -0,0 +1,19 @@
+name: HTML Lint
+
+on:
+  push:
+    branches: [ main, work ]
+  pull_request:
+
+jobs:
+  xmllint:
+    runs-on: ubuntu-latest
+    steps:
+      - name: Checkout
+        uses: actions/checkout@v4
+
+      - name: Install xmllint
+        run: sudo apt-get update && sudo apt-get install -y libxml2-utils
+
+      - name: Validate HTML
+        run: xmllint --html --noout index.html
 
EOF
