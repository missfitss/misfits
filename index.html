<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        body {
            background-color: #1E1A1D;
            color: #C4E7D4;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        header { 
            position: sticky; 
            top: 0; 
            background: rgba(30, 26, 29, 0.9); 
            padding: 20px; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s ease;
        }
        section {
            padding: 60px 20px;
            min-height: 100vh;
            scroll-snap-align: start;
        }
        .home { background: #7F7EFF; }
        .about { background: #DABECA; }
        .work { background: #ECA400; }
        .contact { background: #C4E7D4; }
        footer {
            text-align: center;
            padding: 20px;
            background-color: #1E1A1D;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Portfolio</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#about">About Us</a>
            <a href="#work">Our Work</a>
            <a href="#contact">Contact Us</a>
        </nav>
    </header>
    <main>
        <section id="home" class="home">
            <h2>Welcome!</h2>
        </section>
        <section id="about" class="about">
            <h2>About Us</h2>
            <p>We are a creative agency.</p>
        </section>
        <section id="work" class="work">
            <h2>Our Work</h2>
            <p>Check out our projects.</p>
        </section>
        <section id="contact" class="contact">
            <h2>Contact Us</h2>
            <p>Get in touch!</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 My Portfolio</p>
    </footer>
    <script>
        document.querySelectorAll('nav a').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
